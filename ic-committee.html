<style>
:root{--bg:#060A10;--c1:#111822;--c2:#151E2B;--bd:#1C2636;--bd2:#253040;--t1:#E8ECEF;--t2:#8B95A5;--t3:#5A6577;--t4:#3A4557;--g:#00C805;--r:#FF5000;--y:#FFD60A;--p:#B76EFF;--bl:#5AC8FA}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;min-height:100vh}.m{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}.fu{animation:fu .35s ease both}
.crd{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:20px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:24px;overflow-x:auto}
.tab{padding:12px 18px;background:none;border:none;border-bottom:2px solid transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--t3);cursor:pointer;white-space:nowrap}.tab:hover{color:var(--t2)}.tab.on{color:var(--t1);border-bottom-color:var(--g)}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:5px}
.mc{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:10px}
.ml{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.mv{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--bg);flex-shrink:0}
.br{margin-bottom:8px}.brl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.brt{height:8px;background:#0C1119;border-radius:4px;overflow:hidden}.brf{height:100%;border-radius:4px;transition:width .6s;min-width:3%}
.vc{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:14px;cursor:pointer;transition:.2s}.vc:hover{background:var(--c2)}.vc.inv{border-left:3px solid var(--g)}.vc.pas{border-left:3px solid var(--r)}
.dm{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid var(--bd)}.dm:last-child{border:none}
.sc{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:18px}.sc.bear{border-top:3px solid var(--r)}.sc.base{border-top:3px solid var(--y)}.sc.bull{border-top:3px solid var(--g)}
.ki{width:100%;padding:12px 16px;background:#0C1119;border:1px solid var(--bd);border-radius:10px;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}.ki:focus{border-color:var(--g)}.ki::placeholder{color:var(--t4)}
.dl{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:var(--c1);border:1px solid var(--bd);border-radius:10px;color:var(--t1);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}.dl:hover{border-color:var(--g);color:var(--g)}
@media(max-width:768px){.mg{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}}
</style>

<body><div id="app"></div>
<script>

const S={ph:'setup',pk:localStorage.getItem('ic_pk')||'',tk:'',logs:[],prog:0,err:null,res:null,tab:'overview',exV:null,t0:0};
const MM=[
{n:"Peter Thiel",f:"Founders Fund",a:"PT",c:"#FF6B6B",s:"Contrarian monopoly seeker. 0-to-1, network effects, proprietary tech. 10x returns."},
{n:"Brad Gerstner",f:"Altimeter",a:"BG",c:"#4ECDC4",s:"GARP. Rule of 40+. TAM expansion. Will go activist."},
{n:"Philippe Laffont",f:"Coatue",a:"PL",c:"#45B7D1",s:"Tech growth via alt data. Network effects, platforms, data moats."},
{n:"Stan Druckenmiller",f:"Duquesne",a:"SD",c:"#96CEB4",s:"Macro + concentrated. Bet huge on conviction. Never average down."},
{n:"Paul Tudor Jones",f:"Tudor",a:"PJ",c:"#FFEAA7",s:"200DMA gospel. 5:1 reward-risk. Price action over narrative."},
{n:"Bill Ackman",f:"Pershing Square",a:"BA",c:"#DDA0DD",s:"Concentrated activist. Dominant biz, pricing power. DCF. 3x in 3yr."},
{n:"Dan Loeb",f:"Third Point",a:"DL",c:"#98D8C8",s:"Event-driven. Spin-offs, mgmt changes. Sum-of-parts, hidden assets."},
{n:"George Soros",f:"Soros Fund",a:"GS",c:"#F7DC6F",s:"Reflexivity. Feedback loops. Boom-bust. Massive conviction bets."},
{n:"Gavin Baker",f:"Atreides",a:"GB",c:"#82E0AA",s:"Deep fundamental tech. Secular winners. Variant perception."},
{n:"Steve Cohen",f:"Point72",a:"SC",c:"#AED6F1",s:"Process > outcome. Near-term catalysts. Rarely >5% positions."},
{n:"David Tepper",f:"Appaloosa",a:"DT",c:"#F0B27A",s:"Distressed contrarian. Blood in streets. Multi-bagger upside."},
{n:"Elliott Mgmt",f:"Elliott",a:"EM",c:"#D7BDE2",s:"Activist value. Sum-of-parts. Board changes. Downside protection."},
{n:"Sequoia",f:"Sequoia",a:"SQ",c:"#A3E4D7",s:"Venture lens. 10x in 10yr? TAM, moat durability. Long-duration."},
];

async function pplx(prompt, opts={}) {
  const {model='sonar-pro', timeout=90000, searchMode, domainFilter, recency} = opts;
  const ac=new AbortController(), tm=setTimeout(()=>ac.abort(), timeout);
  const body = {
    model,
    messages:[
      {role:'system',content:'You are a financial data analyst. Return ONLY valid JSON. No markdown, no code fences, no explanation. Just the JSON object.'},
      {role:'user',content:prompt}
    ],
    temperature:0.1,
    max_tokens:8192
  };
  // Add search options
  if(searchMode || domainFilter || recency) {
    const wo = {};
    if(searchMode) wo.search_mode = searchMode;
    if(recency) wo.search_recency_filter = recency;
    body.web_search_options = wo;
  }
  if(domainFilter) body.search_domain_filter = domainFilter;
  if(recency && !body.web_search_options) body.search_recency_filter = recency;

  try {
    const r=await fetch('https://api.perplexity.ai/chat/completions',{
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.pk},
      signal:ac.signal, body:JSON.stringify(body)
    });
    clearTimeout(tm);
    if(!r.ok){const t=await r.text();throw new Error('API '+r.status+': '+t.slice(0,120));}
    const d=await r.json();
    return d.choices?.[0]?.message?.content||'{}';
  }catch(e){clearTimeout(tm);throw e.name==='AbortError'?new Error('Timeout ('+timeout/1000+'s)'):e;}
}

function jp(t){
  if(!t)return null;
  try{
    let c=t.replace(/<think>[\s\S]*?<\/think>/g,'').trim();
    c=c.replace(/```json\s*/g,'').replace(/```/g,'').trim();
    const s=c.indexOf('{'),e=c.lastIndexOf('}');
    if(s>=0&&e>s)return JSON.parse(c.slice(s,e+1));
    return null;
  }catch(e){console.error('JSON parse error:',e.message,t.slice(0,300));return null;}
}
function al(m,t=''){S.logs.push({t:((Date.now()-S.t0)/1000|0)+'s',m,c:t});render();}

async function run(){
  const tk=S.tk.trim().toUpperCase();if(!tk)return;
  S.ph='running';S.logs=[];S.prog=0;S.err=null;S.res=null;S.t0=Date.now();S.tab='overview';render();

  try{
    // ── 1. PRICE + VALUATION (sonar-pro, financial domains) ──
    al('Fetching live price & valuation...','i');S.prog=3;render();
    const r1=await pplx(
      'What is the current stock price and valuation multiples for '+tk+'? I need: company name, sector, sub-industry, 2-sentence description, current stock price, market cap in billions, enterprise value in billions, trailing P/E, forward P/E, EV/EBITDA, EV/Revenue, price to free cash flow, 52-week high, 52-week low, 200-day moving average, and beta. Return JSON with keys: company_name, ticker, sector, sub_industry, description, price, mktcap, ev, pe, fwd_pe, ev_ebitda, ev_rev, p_fcf, hi52, lo52, dma200, beta',
      {domainFilter:['finance.yahoo.com','finviz.com','macrotrends.net','wsj.com','bloomberg.com']}
    );
    const cd=jp(r1);if(!cd||!cd.company_name)throw new Error('Failed to get data. Check ticker & API key.');
    al('\u2713 '+cd.company_name+' \u2014 $'+cd.price,'s');S.prog=8;render();

    // ── 2. MARGINS & GROWTH (sonar-pro) ──
    al('Fetching margins, growth, ownership...','i');
    const r2=await pplx(
      'For '+cd.company_name+' ('+tk+'), what are the current: gross margin %, operating margin %, net margin %, free cash flow margin %, YoY revenue growth %, ROIC %, ROE %, debt-to-equity ratio, dividend yield %, short interest as % of float, institutional ownership %, number of covering analysts, mean analyst price target, and consensus rating (Buy/Hold/Sell)? Return JSON with keys: gm, om, nm, fcfm, rev_gr, roic, roe, de, divy, short_pct, inst, analysts, target, rating',
      {domainFilter:['finance.yahoo.com','finviz.com','macrotrends.net','wisesheets.io']}
    );
    const m2=jp(r2);if(m2)Object.assign(cd,m2);
    al('\u2713 GM '+(cd.gm||0)+'% | OM '+(cd.om||0)+'% | Rev Gr '+(cd.rev_gr||0)+'%','s');S.prog=14;render();

    // ── 3. SEC FILINGS (sonar-pro, search_mode: sec) ──
    al('Pulling SEC filings (EDGAR)...','i');
    const r3=await pplx(
      'Get the actual reported financial data from '+cd.company_name+' ('+tk+') SEC filings. I need the last 3 fiscal years of: revenue in millions, operating income in millions, net income in millions, diluted EPS, and free cash flow in millions. Also the latest quarter revenue and YoY growth, total debt, cash, diluted shares outstanding, management forward guidance, business segment revenue breakdown, and insider buying/selling in last 90 days. Return JSON with keys: filing, years (array of 3 like "FY2022"), rev (array of 3 numbers), oi (array of 3), ni (array of 3), eps (array of 3), fcf (array of 3), q_name, q_rev, q_gr, q_eps, debt, cash, shares, guidance, segments (array of {name,rev,gr}), insiders, risks (array of 3 strings)',
      {searchMode:'sec', timeout:120000}
    );
    const sec=jp(r3);
    al('\u2713 SEC data: '+(sec?.filing||'loaded'),'s');S.prog=24;render();

    // ── 4. ESTIMATES & COMPS (sonar-pro) ──
    al('Fetching consensus estimates & comps...','i');
    const r4=await pplx(
      'What are Wall Street consensus estimates for '+cd.company_name+' ('+tk+')? I need: FY1 and FY2 revenue estimates in millions, FY1 and FY2 revenue growth %, FY1 and FY2 EPS estimates, FY1 EBITDA estimate, recent estimate revision direction, last 4 quarters earnings surprise summary, next earnings date. Also list 4-5 comparable public companies with forward EV/Revenue, EV/EBITDA, forward P/E, revenue growth %, and operating margin %. Include top 3 bull and bear arguments. Return JSON with keys: rev1, rev2, rgr1, rgr2, eps1, eps2, ebitda1, revisions, surprises, next_er, comps (array of {name,tick,evr,eve,pe,rg,om}), bulls (array of 3 strings), bears (array of 3 strings)',
      {domainFilter:['finance.yahoo.com','tipranks.com','seekingalpha.com','marketbeat.com']}
    );
    const est=jp(r4);
    al('\u2713 EPS: FY1 $'+(est?.eps1||'?')+' FY2 $'+(est?.eps2||'?'),'s');S.prog=32;render();

    // ── 5. INDUSTRY (sonar-pro) ──
    al('Analyzing industry & competitive landscape...','i');
    const r5=await pplx(
      'Analyze the industry for '+cd.company_name+' ('+tk+') in the '+cd.sector+' sector. I need: 3-4 sentence industry overview, total addressable market in billions, TAM growth rate %, company market share %, moat rating (none/narrow/wide), 2 moat sources with explanation, Porter Five Forces with scores 1-10 and one sentence detail each (rivalry, new_entrants, substitutes, buyer_power, supplier_power), 3 competitive advantages, 3 risks, 2 secular tailwinds, 2 secular headwinds, top 3 competitors with their edge and market share, and a 3-4 sentence strategic summary. Return JSON with keys: overview, tam, tam_gr, share, moat, moat_src (array), porters ({rivalry:{s,d},entrants:{s,d},subs:{s,d},buyers:{s,d},suppliers:{s,d}}), advs (array), risks (array), tails (array), heads (array), competitors (array of {name,edge,share}), summary'
    );
    const ind=jp(r5);
    al('\u2713 Moat: '+(ind?.moat||'?')+' | TAM: $'+(ind?.tam||'?')+'B','s');S.prog=40;render();

    // ── 6. EARNINGS TRANSCRIPT (sonar-pro, financial sources) ──
    al('Analyzing latest earnings call transcript...','i');
    const r6=await pplx(
      'Search for '+cd.company_name+' ('+tk+') most recent quarterly earnings call transcript. What were the key themes? What was management tone (confident/cautious/defensive)? What did analysts ask about? Any guidance changes or surprises? What did the CEO/CFO emphasize? Return JSON with keys: call_date, themes (array of 3), tone, quotes (array of 2 notable management quotes), analyst_qs (array of 2), guidance_chg, ceo_focus, surprises',
      {domainFilter:['seekingalpha.com','fool.com','quartr.com','finance.yahoo.com'], recency:'month'}
    );
    const transcript=jp(r6);
    al('\u2713 Earnings call: '+(transcript?.tone||'analyzed'),'s');S.prog=46;render();

    // ── 7. FINANCIAL MODEL (sonar-reasoning-pro) ──
    al('Building 3-scenario model (deep reasoning)...','i');
    const modelData=JSON.stringify({mkt:cd,sec,est,ind,transcript});
    const r7=await pplx(
      'You are a top-tier equity research analyst. Build a rigorous 3-scenario financial model for '+cd.company_name+' ('+tk+'). IMPORTANT: Current price is $'+cd.price+'. All upside/downside % must be calculated from $'+cd.price+'. Use the ACTUAL financial data provided below. Bear case must show >15% downside. Bull case must show >25% upside. Use comparable company multiples to inform your target multiples. Ground your assumptions in the earnings transcript and SEC data.\n\nDATA:\n'+modelData+'\n\nReturn ONLY JSON with this structure: {"summary":"4-5 sentences","methodology":"3-4 sentences","drivers":[{"d":"driver name","cur":"current","bear":"bear","base":"base","bull":"bull"}],"bear":{"p":20,"nar":"4-5 sentences on what goes wrong","asmp":["a1","a2","a3"],"r1":0,"r2":0,"rg1":0,"rg2":0,"gm2":0,"om2":0,"e1":0,"e2":0,"fcf":0,"tpe":0,"teve":0,"tgt":0,"dn":0},"base":{"p":55,"nar":"4-5 sentences most likely","asmp":["a1","a2","a3"],"r1":0,"r2":0,"rg1":0,"rg2":0,"gm2":0,"om2":0,"e1":0,"e2":0,"fcf":0,"tpe":0,"teve":0,"tgt":0,"up":0},"bull":{"p":25,"nar":"4-5 sentences what goes right","asmp":["a1","a2","a3"],"r1":0,"r2":0,"rg1":0,"rg2":0,"gm2":0,"om2":0,"e1":0,"e2":0,"fcf":0,"tpe":0,"teve":0,"tgt":0,"up":0},"pw":0,"ret":0,"rr":0,"cats":["c1","c2","c3"],"drisks":["r1","r2","r3"]}',
      {model:'sonar-reasoning-pro', timeout:180000}
    );
    const fm=jp(r7);if(!fm||!fm.pw)throw new Error('Model generation failed — try again');
    al('\u2713 Model: PW $'+fm.pw+' ('+(fm.ret>0?'+':'')+fm.ret+'%)','s');S.prog=58;render();

    // ── 8. IC VOTES (sonar-reasoning-pro, 2 parallel batches) ──
    al('Convening IC \u2014 13 investors voting...','i');
    const brief=JSON.stringify({c:cd,sec,est,ind,transcript,fm});
    function mkVotePrompt(members){
      return 'Simulate an investment committee meeting. DEEPLY embody each investor using their real philosophy and catchphrases. Each MUST reference specific numbers from the data. Price: $'+cd.price+'. PW Target: $'+fm.pw+'. Bear: $'+(fm.bear?.tgt||0)+' ('+(fm.bear?.dn||0)+'%). Base: $'+(fm.base?.tgt||0)+' (+'+(fm.base?.up||0)+'%). Bull: $'+(fm.bull?.tgt||0)+' (+'+(fm.bull?.up||0)+'%). Revenue growth: '+(cd.rev_gr||0)+'%. Operating margin: '+(cd.om||0)+'%. P/E: '+(cd.pe||0)+'. Moat: '+(ind?.moat||'?')+'. TAM: $'+(ind?.tam||0)+'B.\n\nINVESTORS:\n'+members.map(function(m){return m.n+' ('+m.f+'): '+m.s;}).join('\n')+'\n\nDATA BRIEF:\n'+brief+'\n\nReturn ONLY JSON: {"votes":['+members.map(function(m){return '{"name":"'+m.n+'","vote":"INVEST or PASS","conviction":7,"size":5,"reasoning":"4-5 sentences with specific numbers","concern":"specific concern","catalyst":"specific catalyst","horizon":"time horizon"}';}).join(',')+']}';
    }
    const[vr1,vr2]=await Promise.all([
      pplx(mkVotePrompt(MM.slice(0,7)),{model:'sonar-reasoning-pro',timeout:120000}),
      pplx(mkVotePrompt(MM.slice(7)),{model:'sonar-reasoning-pro',timeout:120000})
    ]);
    const votes=[...(jp(vr1)?.votes||[]),...(jp(vr2)?.votes||[])];
    const iC=votes.filter(function(v){return v.vote==='INVEST';}).length;
    al('\u2713 IC: '+iC+'/'+votes.length+' INVEST','s');S.prog=78;render();

    // ── 9. IC DEBATE (sonar-reasoning-pro) ──
    al('Generating IC debate...','i');
    const r9=await pplx(
      'Generate a heated investment committee debate transcript for '+cd.company_name+' ('+tk+'). 13 famous investors arguing about whether to invest. RULES: 1) Each speaker sounds EXACTLY like themselves with real catchphrases 2) GENUINE disagreement, not polite consensus 3) Reference SPECIFIC numbers: price $'+cd.price+', rev growth '+(cd.rev_gr||0)+'%, op margin '+(cd.om||0)+'%, P/E '+(cd.pe||0)+', EV/EBITDA '+(cd.ev_ebitda||0)+' 4) Model targets: Bear $'+(fm.bear?.tgt||0)+' / Base $'+(fm.base?.tgt||0)+' / Bull $'+(fm.bull?.tgt||0)+', PW $'+fm.pw+' 5) 2-3 sentence punchy messages 6) At least one person changes their mind 7) 20-25 messages total 8) Cover valuation, growth, competitive position, sizing. IC votes were: '+votes.map(function(v){return v.name+':'+v.vote+'('+v.conviction+')';}).join(', ')+'. Investors: '+MM.map(function(m){return m.n;}).join(', ')+'. Return ONLY JSON: {"msgs":[{"who":"Full Name","txt":"their words","tone":"bullish|bearish|challenging|conceding|provocative"}]}',
      {model:'sonar-reasoning-pro',timeout:120000}
    );
    const db=jp(r9);
    al('\u2713 Debate: '+(db?.msgs?.length||0)+' messages','s');S.prog=92;render();

    // ── 10. VERDICT ──
    const tC=votes.length||1;
    const aC=votes.reduce(function(a,v){return a+(v.conviction||0);},0)/tC;
    const aS=votes.filter(function(v){return v.vote==='INVEST';}).reduce(function(a,v){return a+(v.size||0);},0)/(iC||1);
    const eR=fm.ret||0,rr=fm.rr||0;
    var dec,sl;
    if(iC>=9&&aC>=7&&eR>20&&rr>2){dec='STRONG BUY';sl='25% of book';}
    else if(iC>=7&&eR>15){dec='BUY';sl='10% of book';}
    else if(iC>=5&&eR>5){dec='MODEST BUY';sl='1-3% of book';}
    else if(iC>=4){dec='HOLD';sl='1% watch';}
    else{dec='PASS';sl='0%';}

    S.res={c:cd,sec:sec,est:est,ind:ind,transcript:transcript,fm:fm,votes:votes,db:db,v:{dec:dec,sl:sl,iC:iC,tC:votes.length,aC:aC.toFixed(1),aS:aS.toFixed(1),eR:eR,rr:rr}};
    S.prog=100;
    al('\u2713 VERDICT: '+dec+' \u2014 '+sl,'s');
    al('\u2713 Done in '+((Date.now()-S.t0)/1000|0)+'s','s');
    S.ph='done';render();
  }catch(e){console.error(e);al('\u274c '+e.message,'e');S.err=e.message;render();}
}

function dlModel(){
  var R=S.res;if(!R)return;var c=R.c,sec=R.sec,est=R.est,fm=R.fm,votes=R.votes,v=R.v;
  var wb=XLSX.utils.book_new();
  var s1=[
    [c.company_name+' ('+c.ticker+') \u2014 IC Analysis'],[new Date().toLocaleDateString()],[],
    ['VERDICT',v.dec],['Size',v.sl],['IC Vote',v.iC+'/'+v.tC],['Conviction',v.aC+'/10'],['Expected Return',v.eR+'%'],['R:R',v.rr+'x'],[],
    ['PRICE TARGETS'],['Current','',c.price],['Bear',fm.bear.p+'%',fm.bear.tgt,fm.bear.dn+'%'],['Base',fm.base.p+'%',fm.base.tgt,'+'+fm.base.up+'%'],['Bull',fm.bull.p+'%',fm.bull.tgt,'+'+fm.bull.up+'%'],['PW Target','',fm.pw,fm.ret+'%'],[],
    ['METRICS'],['Mkt Cap','$'+c.mktcap+'B'],['EV','$'+c.ev+'B'],['P/E',c.pe],['Fwd P/E',c.fwd_pe],['EV/EBITDA',c.ev_ebitda],['EV/Rev',c.ev_rev],['Gross Mgn',c.gm+'%'],['Op Mgn',c.om+'%'],['FCF Mgn',c.fcfm+'%'],['Rev Gr',c.rev_gr+'%'],['ROIC',c.roic+'%'],['D/E',c.de],['200DMA','$'+c.dma200]
  ];
  var ws1=XLSX.utils.aoa_to_sheet(s1);ws1['!cols']=[{wch:20},{wch:12},{wch:12},{wch:12}];XLSX.utils.book_append_sheet(wb,ws1,'Summary');

  var s2=[[c.company_name+' \u2014 Model'],[],['','Bear','Base','Bull'],['Prob',fm.bear.p+'%',fm.base.p+'%',fm.bull.p+'%'],[],
    ['Rev FY1 ($M)',fm.bear.r1,fm.base.r1,fm.bull.r1],['Rev FY2 ($M)',fm.bear.r2,fm.base.r2,fm.bull.r2],
    ['Rev Gr FY1',fm.bear.rg1+'%',fm.base.rg1+'%',fm.bull.rg1+'%'],['Rev Gr FY2',fm.bear.rg2+'%',fm.base.rg2+'%',fm.bull.rg2+'%'],[],
    ['GM FY2',fm.bear.gm2+'%',fm.base.gm2+'%',fm.bull.gm2+'%'],['OM FY2',fm.bear.om2+'%',fm.base.om2+'%',fm.bull.om2+'%'],
