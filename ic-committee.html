<script>
// ═══ STATE & CONSTANTS ═══
const S={ph:'setup',pk:localStorage.getItem('ic_pk')||'',ck:localStorage.getItem('ic_ck')||'',tk:'',logs:[],prog:0,err:null,res:null,tab:'overview',exV:null,t0:0};
const MM=[
{n:"Peter Thiel",f:"Founders Fund",a:"PT",c:"#FF6B6B",s:"Contrarian monopoly seeker. 0-to-1, network effects, proprietary tech. Hates competition. 10x. Founder-led with secrets."},
{n:"Brad Gerstner",f:"Altimeter",a:"BG",c:"#4ECDC4",s:"GARP. Rule of 40+. TAM expansion. Will go activist if needed."},

{n:"Stan Druckenmiller",f:"Duquesne",a:"SD",c:"#96CEB4",s:"Macro + concentrated. Bet huge on conviction. Never average down."},
{n:"Paul Tudor Jones",f:"Tudor",a:"PJ",c:"#FFEAA7",s:"200DMA gospel. 5:1 reward-risk. Price action over narrative."},
{n:"Bill Ackman",f:"Pershing Square",a:"BA",c:"#DDA0DD",s:"Concentrated activist. Dominant biz, pricing power. DCF. 3x in 3yr."},
{n:"Dan Loeb",f:"Third Point",a:"DL",c:"#98D8C8",s:"Event-driven. Spin-offs, mgmt changes. Sum-of-parts, hidden assets."},
{n:"George Soros",f:"Soros Fund",a:"GS",c:"#F7DC6F",s:"Reflexivity. Feedback loops. Boom-bust. Massive conviction bets."},
{n:"Gavin Baker",f:"Atreides",a:"GB",c:"#82E0AA",s:"Deep fundamental tech. Secular winners. Variant perception."},
{n:"Steve Cohen",f:"Point72",a:"SC",c:"#AED6F1",s:"Process > outcome. Near-term catalysts. Rarely >5% positions."},
{n:"David Tepper",f:"Appaloosa",a:"DT",c:"#F0B27A",s:"Distressed contrarian. Blood in streets. Multi-bagger upside."},
{n:"Elliott Mgmt",f:"Elliott",a:"EM",c:"#D7BDE2",s:"Activist value. Sum-of-parts. Board changes. Downside protection."},
{n:"Sequoia",f:"Sequoia",a:"SQ",c:"#A3E4D7",s:"Venture lens. 10x in 10yr? TAM, moat durability. Long-duration."},
];

// ═══ API HELPERS ═══
async function pplx(prompt, to=90000) {
  const ac=new AbortController(),tm=setTimeout(()=>ac.abort(),to);
  try {
    const r=await fetch('https://api.perplexity.ai/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.pk},
      signal:ac.signal,
      body:JSON.stringify({model:'sonar-pro',messages:[
        {role:'system',content:'You are a financial data assistant. Return ONLY valid JSON. No markdown, no code fences, no explanation text. Just the JSON object.'},
        {role:'user',content:prompt}
      ],temperature:0.1,max_tokens:4096})
    });
    clearTimeout(tm);
    if(!r.ok){const t=await r.text();throw new Error(`Perplexity ${r.status}: ${t.slice(0,100)}`);}
    const d=await r.json();return d.choices?.[0]?.message?.content||'{}';
  }catch(e){clearTimeout(tm);throw e.name==='AbortError'?new Error('Perplexity timeout'):e;}
}

async function claude(sys, usr, to=120000) {
  const ac=new AbortController(),tm=setTimeout(()=>ac.abort(),to);
  try {
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.ck,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      signal:ac.signal,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8192,system:sys,messages:[{role:'user',content:usr}]})
    });
    clearTimeout(tm);
    if(!r.ok){const t=await r.text();throw new Error(`Claude ${r.status}: ${t.slice(0,100)}`);}
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  }catch(e){clearTimeout(tm);throw e.name==='AbortError'?new Error('Claude timeout'):e;}
}

function jp(t){try{const c=t.replace(/```json\s*/g,'').replace(/```/g,'').trim(),s=c.indexOf('{'),e=c.lastIndexOf('}');return s>=0&&e>s?JSON.parse(c.slice(s,e+1)):null}catch(e){console.error('JP:',e.message);return null;}}
function al(m,t=''){S.logs.push({t:`${((Date.now()-S.t0)/1000)|0}s`,m,c:t});render();}

// ═══ ANALYSIS ENGINE ═══
// Key insight: break Perplexity queries into SMALL focused asks so it actually fills in every field
async function run(){
  const t=S.tk.trim().toUpperCase();if(!t)return;
  S.ph='running';S.logs=[];S.prog=0;S.err=null;S.res=null;S.t0=Date.now();S.tab='overview';render();

  try{
    // ── 1a. PRICE + VALUATION (focused query) ──
    al('Searching current price & valuation...','i');S.prog=2;render();
    const q1=await pplx(`What is the current stock price, market cap, enterprise value, P/E ratio, forward P/E, EV/EBITDA, EV/Revenue, and price-to-free-cash-flow for ${t}? Also include 52-week high, 52-week low, 200-day moving average, and beta.

Return JSON: {"company_name":"","ticker":"${t}","sector":"","sub_industry":"","description":"2-3 sentences","current_price":0,"market_cap_B":0,"enterprise_value_B":0,"pe_ratio":0,"forward_pe":0,"ev_ebitda":0,"ev_revenue":0,"price_to_fcf":0,"fifty_two_week_high":0,"fifty_two_week_low":0,"two_hundred_dma":0,"beta":0}`);
    const cd=jp(q1);if(!cd?.company_name)throw new Error('Failed to get price data. Check ticker/Perplexity key.');
    al(`✓ ${cd.company_name} — $${cd.current_price}`,'s');S.prog=8;render();

    // ── 1b. MARGINS + GROWTH (focused query) ──
    al('Fetching margins & growth metrics...','i');
    const q2=await pplx(`What are ${cd.company_name} (${t}) current financial margins and growth rates? Specifically: gross margin %, operating margin %, net margin %, free cash flow margin %, revenue growth YoY %, earnings growth YoY %, ROIC %, ROE %, debt-to-equity ratio, dividend yield %, short interest %, and number of Wall Street analysts covering the stock.

Return JSON: {"gross_margin_pct":0,"operating_margin_pct":0,"net_margin_pct":0,"fcf_margin_pct":0,"revenue_growth_yoy_pct":0,"earnings_growth_yoy_pct":0,"roic_pct":0,"roe_pct":0,"debt_to_equity":0,"dividend_yield_pct":0,"short_interest_pct":0,"analyst_count":0,"consensus_target":0,"consensus_rating":""}`);
    const m2=jp(q2);Object.assign(cd,m2||{});
    al(`✓ Margins: GM ${cd.gross_margin_pct}%, OM ${cd.operating_margin_pct}%`,'s');S.prog=14;render();

    // ── 2. SEC FILINGS & FINANCIALS (Perplexity) ──
    al('Pulling SEC filings & reported financials...','i');
    const q3=await pplx(`Search for ${cd.company_name} (${t}) most recent SEC filings. Get actual reported annual revenue, operating income, net income, and EPS for the last 3 fiscal years. Also get the most recent quarter's revenue, YoY growth, and EPS. Include total debt, cash on hand, and any management guidance.

Return JSON: {"latest_filing":"10-K FY2024 etc","annual_years":["FY2022","FY2023","FY2024"],"annual_revenue_M":[0,0,0],"annual_op_income_M":[0,0,0],"annual_net_income_M":[0,0,0],"annual_eps":[0,0,0],"annual_fcf_M":[0,0,0],"latest_q":"Q4 2024","latest_q_revenue_M":0,"latest_q_yoy_growth_pct":0,"latest_q_eps":0,"total_debt_M":0,"cash_M":0,"shares_M":0,"guidance":"management guidance text","segments":[{"name":"seg","revenue_M":0,"growth_pct":0}],"insider_activity":"recent insider trades","risks":["risk1","risk2","risk3"]}`);
    const sec=jp(q3);
    al(`✓ SEC data: ${sec?.latest_filing||'loaded'}`,'s');S.prog=22;render();

    // ── 3. ESTIMATES + COMPS (Perplexity) ──
    al('Fetching consensus estimates & comparable companies...','i');
    const q4=await pplx(`What are the Wall Street consensus revenue and EPS estimates for ${cd.company_name} (${t}) for the next 2 fiscal years? Also list 4-5 comparable public companies with their EV/Revenue, EV/EBITDA, forward P/E, revenue growth rate, and operating margin.

Return JSON: {"rev_est_FY1_M":0,"rev_est_FY2_M":0,"rev_gr_FY1_pct":0,"rev_gr_FY2_pct":0,"eps_est_FY1":0,"eps_est_FY2":0,"ebitda_est_FY1_M":0,"estimate_revisions":"up or down recently","earnings_surprises":"last 4 quarters summary","next_earnings":"date","comps":[{"name":"","ticker":"","ev_rev":0,"ev_ebitda":0,"fwd_pe":0,"rev_gr_pct":0,"op_margin_pct":0}],"bull_args":["","",""],"bear_args":["","",""],"analyst_notes":["",""]}`);
    const est=jp(q4);
    al(`✓ Estimates: EPS FY1 $${est?.eps_est_FY1||'?'}, FY2 $${est?.eps_est_FY2||'?'}`,'s');S.prog=30;render();

    // ── 4. INDUSTRY (Perplexity) ──
    al('Analyzing industry & competitive landscape...','i');
    const q5=await pplx(`Analyze the industry for ${cd.company_name} (${t}) in ${cd.sector}. What is the total addressable market size, growth rate, company's market share, moat rating (none/narrow/wide), and competitive advantages? Include Porter's Five Forces scores (1-10 each) and key competitors.

Return JSON: {"industry_overview":"3-4 sentences","tam_B":0,"tam_growth_pct":0,"market_share_pct":0,"moat":"narrow","moat_sources":["",""],"porters":{"rivalry":{"s":5,"d":"detail"},"new_entrants":{"s":5,"d":""},"substitutes":{"s":5,"d":""},"buyer_power":{"s":5,"d":""},"supplier_power":{"s":5,"d":""}},"advantages":["","",""],"risks":["","",""],"tailwinds":["",""],"headwinds":["",""],"competitors":[{"name":"","edge":"","share_pct":0}],"summary":"3-4 sentence synthesis"}`);
    const ind=jp(q5);
    al(`✓ Industry: ${ind?.moat||'?'} moat, $${ind?.tam_B||'?'}B TAM`,'s');S.prog=38;render();

    // ── 5. FINANCIAL MODEL (Claude — this is where it shines) ──
    al('Claude building 3-scenario financial model...','i');
    const mi=JSON.stringify({market:cd,sec,estimates:est,industry:ind});
    const fmRaw=await claude(
`You are a top-tier Goldman Sachs equity research analyst. Build a rigorous 3-scenario financial model. RULES:
1. Current price is $${cd.current_price}. All % calculated from this.
2. Use ACTUAL SEC data provided — don't invent historicals.
3. Bear case >15% downside, bull >25% upside.
4. Comp multiples should inform target multiples.
5. Return ONLY valid JSON, no other text.`,
`Model for ${cd.company_name} (${t}).

DATA: ${mi}

Return JSON:
{"summary":"4-5 sentences","methodology":"3-4 sentences",
"drivers":[{"driver":"name","current":"v","bear":"v","base":"v","bull":"v"}],
"bear":{"prob":20,"narrative":"4-5 sentences","assumptions":["a1","a2","a3"],"rev_FY1_M":0,"rev_FY2_M":0,"rev_gr_FY1":0,"rev_gr_FY2":0,"gm_FY2":0,"om_FY2":0,"eps_FY1":0,"eps_FY2":0,"fcf_ps":0,"pe":0,"ev_ebitda":0,"target":0,"down_pct":0},
"base":{"prob":55,"narrative":"4-5 sentences","assumptions":["a1","a2","a3"],"rev_FY1_M":0,"rev_FY2_M":0,"rev_gr_FY1":0,"rev_gr_FY2":0,"gm_FY2":0,"om_FY2":0,"eps_FY1":0,"eps_FY2":0,"fcf_ps":0,"pe":0,"ev_ebitda":0,"target":0,"up_pct":0},
"bull":{"prob":25,"narrative":"4-5 sentences","assumptions":["a1","a2","a3"],"rev_FY1_M":0,"rev_FY2_M":0,"rev_gr_FY1":0,"rev_gr_FY2":0,"gm_FY2":0,"om_FY2":0,"eps_FY1":0,"eps_FY2":0,"fcf_ps":0,"pe":0,"ev_ebitda":0,"target":0,"up_pct":0},
"pw_target":0,"exp_ret_pct":0,"rr_ratio":0,
"catalysts":["c1","c2","c3"],"risks":["r1","r2","r3"]}`,120000);
    const fm=jp(fmRaw);if(!fm)throw new Error('Model generation failed');
    al(`✓ Model: PW $${fm.pw_target} (${fm.exp_ret_pct>0?'+':''}${fm.exp_ret_pct}%)`,'s');S.prog=55;render();

    // ── 6. IC VOTES (Claude, 2 parallel batches) ──
    al('Convening IC — 13 legendary investors...','i');
    const brief=JSON.stringify({c:cd,sec,est,ind,fm});
    const mkV=ms=>[
`You are simulating a hedge fund IC. DEEPLY embody each investor. They MUST reference specific data points.`,
`INVESTORS:\n${ms.map(m=>`${m.n} (${m.f}): ${m.s}`).join('\n')}

BRIEF: ${brief}
Price: $${cd.current_price} | PW: $${fm.pw_target} | Ret: ${fm.exp_ret_pct}%
Bear: $${fm.bear?.target} (${fm.bear?.down_pct}%) | Base: $${fm.base?.target} (+${fm.base?.up_pct}%) | Bull: $${fm.bull?.target} (+${fm.bull?.up_pct}%)

Return ONLY JSON:
{"votes":[${ms.map(m=>`{"name":"${m.n}","vote":"INVEST","conviction":7,"size_pct":5,"reasoning":"4-5 sentences with numbers","concern":"specific","catalyst":"specific","horizon":"timeframe"}`).join(',')}]}`];
    const b1=mkV(MM.slice(0,7)),b2=mkV(MM.slice(7));
    const[v1r,v2r]=await Promise.all([claude(b1[0],b1[1],120000),claude(b2[0],b2[1],120000)]);
    const votes=[...(jp(v1r)?.votes||[]),...(jp(v2r)?.votes||[])];
    const iC=votes.filter(v=>v.vote==='INVEST').length;
    al(`✓ IC: ${iC}/${votes.length} voted INVEST`,'s');S.prog=75;render();

    // ── 7. IC DEBATE (Claude) ──
    al('Generating rigorous IC debate...','i');
    const dbRaw=await claude(
`Generate a HEATED investment committee debate. Rules:
1. Each speaker sounds exactly like themselves with their catchphrases
2. GENUINE disagreement — not polite consensus
3. Reference SPECIFIC numbers from the data
4. 2-3 sentence messages, punchy
5. At least one person changes their mind
6. 20-25 messages
7. Cover: valuation, growth sustainability, competitive position, sizing`,
`Debate for ${cd.company_name} (${t}).
Price $${cd.current_price}, Rev Gr ${cd.revenue_growth_yoy_pct}%, OM ${cd.operating_margin_pct}%, P/E ${cd.pe_ratio}, EV/EBITDA ${cd.ev_ebitda}
Model: Bear $${fm.bear?.target} / Base $${fm.base?.target} / Bull $${fm.bull?.target}, PW $${fm.pw_target}
Votes: ${votes.map(v=>`${v.name}:${v.vote}(${v.conviction})`).join(', ')}
Moat: ${ind?.moat}, TAM: $${ind?.tam_B}B
Investors: ${MM.map(m=>m.n).join(', ')}

Return ONLY JSON: {"messages":[{"speaker":"Full Name","text":"their words","tone":"bullish|bearish|challenging|conceding|provocative"}]}`,120000);
    const db=jp(dbRaw);
    al(`✓ Debate: ${db?.messages?.length||0} messages`,'s');S.prog=90;render();

    // ── 8. VERDICT ──
    const tC=votes.length||1,aC=votes.reduce((a,v)=>a+(v.conviction||0),0)/tC;
    const aS=votes.filter(v=>v.vote==='INVEST').reduce((a,v)=>a+(v.size_pct||0),0)/(iC||1);
    const eR=fm.exp_ret_pct||0,rr=fm.rr_ratio||0;
    let dec,sl;
    if(iC>=9&&aC>=7&&eR>20&&rr>2){dec='STRONG BUY';sl='25% of book';}
    else if(iC>=7&&eR>15){dec='BUY';sl='10% of book';}
    else if(iC>=5&&eR>5){dec='MODEST BUY';sl='1-3% of book';}
    else if(iC>=4){dec='HOLD';sl='1% watch';}
    else{dec='PASS';sl='0% — no position';}

    S.res={c:cd,sec,est,ind,fm,votes,db,v:{dec,sl,iC,tC:votes.length,aC:aC.toFixed(1),aS:aS.toFixed(1),eR,rr}};
    S.prog=100;al(`✓ VERDICT: ${dec} — ${sl}`,'s');al(`✓ Done in ${((Date.now()-S.t0)/1000)|0}s`,'s');
    S.ph='done';render();
  }catch(e){console.error(e);al(`❌ ${e.message}`,'e');S.err=e.message;render();}
}

// ═══ XLSX EXPORT ═══
function dlModel(){
  const{c,sec,est,fm,votes,v}=S.res;if(!fm)return;
  const wb=XLSX.utils.book_new();

  // Summary
  const s1=[
    [`${c.company_name} (${c.ticker}) — IC Analysis`],[`${new Date().toLocaleDateString()}`],[],
    ['VERDICT',v.dec],['Size',v.sl],['IC Vote',`${v.iC}/${v.tC}`],['Conviction',`${v.aC}/10`],
    ['Expected Return',`${v.eR}%`],['R:R',`${v.rr}x`],[],
    ['PRICE TARGETS'],['Current',,c.current_price],
    ['Bear',fm.bear?.prob+'%',fm.bear?.target,`${fm.bear?.down_pct}%`],
    ['Base',fm.base?.prob+'%',fm.base?.target,`+${fm.base?.up_pct}%`],
    ['Bull',fm.bull?.prob+'%',fm.bull?.target,`+${fm.bull?.up_pct}%`],
    ['PW Target',,fm.pw_target,`${fm.exp_ret_pct}%`],[],
    ['METRICS'],['Mkt Cap',`$${c.market_cap_B}B`],['EV',`$${c.enterprise_value_B}B`],
    ['P/E',c.pe_ratio],['Fwd P/E',c.forward_pe],['EV/EBITDA',c.ev_ebitda],
    ['EV/Rev',c.ev_revenue],['Gross Mgn',`${c.gross_margin_pct}%`],['Op Mgn',`${c.operating_margin_pct}%`],
    ['FCF Mgn',`${c.fcf_margin_pct}%`],['Rev Gr',`${c.revenue_growth_yoy_pct}%`],
    ['ROIC',`${c.roic_pct}%`],['D/E',c.debt_to_equity],['200DMA',`$${c.two_hundred_dma}`],
  ];
  const ws1=XLSX.utils.aoa_to_sheet(s1);ws1['!cols']=[{wch:20},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws1,'Summary');

  // Model
  const s2=[
    [`${c.company_name} — 3-Scenario Model`],[],
    ['','Bear','Base','Bull'],['Probability',fm.bear?.prob+'%',fm.base?.prob+'%',fm.bull?.prob+'%'],[],
    ['Revenue FY1 ($M)',fm.bear?.rev_FY1_M,fm.base?.rev_FY1_M,fm.bull?.rev_FY1_M],
    ['Revenue FY2 ($M)',fm.bear?.rev_FY2_M,fm.base?.rev_FY2_M,fm.bull?.rev_FY2_M],
    ['Rev Growth FY1',`${fm.bear?.rev_gr_FY1}%`,`${fm.base?.rev_gr_FY1}%`,`${fm.bull?.rev_gr_FY1}%`],
