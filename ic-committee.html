<style>
:root {

  --border: #1C2636; --border2: #253040;

  --blue: #5AC8FA; --cyan: #4ECDC4; --orange: #F0B27A;
  --green10: rgba(0,200,5,0.1); --red10: rgba(255,80,0,0.1);

}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--t1); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
.mono { font-family:'JetBrains Mono',monospace; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

/* Animations */
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(0,200,5,0.15)} 50%{box-shadow:0 0 40px rgba(0,200,5,0.3)} }
.fade-up { animation:fadeUp 0.5s ease both; }
.stagger-1 { animation-delay:0.05s; }
.stagger-2 { animation-delay:0.1s; }
.stagger-3 { animation-delay:0.15s; }
.stagger-4 { animation-delay:0.2s; }

/* Layout */
.container { max-width:1200px; margin:0 auto; padding:20px 24px 80px; }
.flex { display:flex; }
.flex-col { flex-direction:column; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.gap-4 { gap:4px; } .gap-6 { gap:6px; } .gap-8 { gap:8px; } .gap-10 { gap:10px; } .gap-12 { gap:12px; } .gap-14 { gap:14px; } .gap-16 { gap:16px; } .gap-20 { gap:20px; }
.grid { display:grid; }
.wrap { flex-wrap:wrap; }

/* Cards */
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; }
.card-sm { padding:14px; border-radius:10px; }
.card-hover { transition:all 0.2s; cursor:pointer; }
.card-hover:hover { border-color:var(--border2); background:var(--card2); transform:translateY(-1px); }

/* Typography */
h1 { font-size:36px; font-weight:800; letter-spacing:-1.5px; line-height:1.1; }
h2 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
h3 { font-size:16px; font-weight:700; }
.text-sm { font-size:13px; } .text-xs { font-size:11px; } .text-xxs { font-size:10px; }
.text-muted { color:var(--t2); } .text-dim { color:var(--t3); } .text-faint { color:var(--t4); }
.font-bold { font-weight:700; } .font-black { font-weight:900; }
.uppercase { text-transform:uppercase; letter-spacing:0.5px; }

/* Buttons */
.btn { padding:12px 24px; border:none; border-radius:12px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.15s; display:inline-flex; align-items:center; gap:8px; }
.btn-primary { background:var(--green); color:var(--bg); }

.btn-secondary { background:var(--card); border:1px solid var(--border); color:var(--t1); }

.btn-xs { padding:5px 12px; font-size:11px; border-radius:6px; }

.progress-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.8s ease; }

async function callPerplexity(prompt, timeout = 90000) {
  const ac = new AbortController();
  const tm = setTimeout(() => ac.abort(), timeout);
  try {
    const r = await fetch('https://api.perplexity.ai/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${STATE.perplexityKey}` },
      signal: ac.signal,
      body: JSON.stringify({
        model: 'sonar-pro',
        messages: [
          { role: 'system', content: 'You are a financial data research assistant. Return ONLY valid JSON with no markdown formatting, no code blocks, no explanation. Just the raw JSON object.' },
          { role: 'user', content: prompt }
        ],
        temperature: 0.1,
        max_tokens: 4096,
      }),
    });
    clearTimeout(tm);
    if (!r.ok) { const t = await r.text(); throw new Error(`Perplexity ${r.status}: ${t.substring(0,150)}`); }
    const d = await r.json();
    return d.choices?.[0]?.message?.content || '{}';
  } catch(e) { clearTimeout(tm); throw e.name==='AbortError' ? new Error('Perplexity timeout (90s)') : e; }
}

async function callClaude(systemPrompt, userPrompt, timeout = 90000) {
  const ac = new AbortController();
  const tm = setTimeout(() => ac.abort(), timeout);
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': STATE.claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      signal: ac.signal,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8192,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }],
      }),
    });
    clearTimeout(tm);
    if (!r.ok) { const t = await r.text(); throw new Error(`Claude ${r.status}: ${t.substring(0,150)}`); }
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return (d.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
  } catch(e) { clearTimeout(tm); throw e.name==='AbortError' ? new Error('Claude timeout (90s)') : e; }
}

function parseJSON(text) {
  if (!text) return null;
  try {
    const clean = text.replace(/```json\s*/g, '').replace(/```/g, '').trim();
    // Try to find a JSON object
    const start = clean.indexOf('{');
    const end = clean.lastIndexOf('}');
    if (start >= 0 && end > start) return JSON.parse(clean.slice(start, end + 1));
    return null;
  } catch(e) {
    console.error('JSON parse error:', e.message, text.substring(0, 200));
    return null;
  }
}

  // ── Sheet 4: IC Votes ──

    }),

  ws4['!cols'] = [{wch:20},{wch:18},{wch:8},{wch:10},{wch:10},{wch:14},{wch:30},{wch:30},{wch:50}];

  // ── Sheet 5: Comparable Companies ──

    XLSX.utils.book_append_sheet(wb, ws5, 'Comps');
  }

  // Save
  XLSX.writeFile(wb, `${c.ticker}_IC_Analysis_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// RENDER ENGINE
// ══════════════════════════════════════════════════════════════════════

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  }
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
  }
  return el;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (STATE.phase === 'setup') app.appendChild(renderSetup());
  else if (STATE.phase === 'input') app.appendChild(renderInput());
  else if (STATE.phase === 'running') app.appendChild(renderRunning());
  else if (STATE.phase === 'done') app.appendChild(renderResults());
}

                    h('div', {},
                      h('span', { className: 'mono font-bold' }, val),
                      sub ? h('span', { className: 'text-dim text-xs', style: { marginLeft: '6px' } }, sub) : null,
                    )
                  )
                ),
              ),

              // Assumptions
              s.key_assumptions?.length ? h('div', { style: { marginTop: '12px', paddingTop: '12px', borderTop: '1px solid var(--border)' } },
                h('div', { className: 'text-xxs uppercase text-dim', style: { marginBottom: '6px' } }, 'Key Assumptions'),
                ...s.key_assumptions.map(a => h('p', { className: 'text-xs text-muted', style: { padding: '2px 0', lineHeight: '1.5' } }, `• ${a}`))
              ) : null,
            );
          })
        ),

        // Catalysts & Risks
        h('div', { className: 'grid gap-12', style: { gridTemplateColumns: '1fr 1fr' } },
          fm.upside_catalysts?.length ? h('div', { className: 'card' },
            h('div', { className: 'text-xxs uppercase', style: { color: 'var(--green)', fontWeight: '700', marginBottom: '8px' } }, 'Upside Catalysts'),
            ...fm.upside_catalysts.map(c => h('p', { className: 'text-sm text-muted', style: { padding: '3px 0', lineHeight: '1.5' } }, `↑ ${c}`))
          ) : null,
          fm.downside_risks?.length ? h('div', { className: 'card' },
            h('div', { className: 'text-xxs uppercase', style: { color: 'var(--red)', fontWeight: '700', marginBottom: '8px' } }, 'Downside Risks'),
            ...fm.downside_risks.map(r => h('p', { className: 'text-sm text-muted', style: { padding: '3px 0', lineHeight: '1.5' } }, `↓ ${r}`))
          ) : null,
        ),
      );

    // ── INDUSTRY TAB ──
    case 'industry':
      if (!ind) return h('div', { className: 'text-dim', style: { padding: '40px', textAlign: 'center' } }, 'Industry data unavailable.');
      const porters = ind.porters_five_forces ? Object.entries(ind.porters_five_forces) : [];
      const maxForce = 10;
      return h('div', { className: 'fade-up' },
        h('p', { className: 'text-muted', style: { lineHeight: '1.7', marginBottom: '20px', maxWidth: '700px', fontSize: '14px' } }, ind.industry_overview),

        // TAM + Market
        h('div', { className: 'flex gap-8 wrap', style: { marginBottom: '16px' } },
          ...[
            [`$${ind.tam_current_B}B`, 'TAM Now', 'var(--blue)'],
            [`$${ind.tam_2030_B}B`, 'TAM 2030', 'var(--green)'],
            [`${ind.tam_cagr_pct}%`, 'CAGR', 'var(--yellow)'],
            [`${ind.market_share_pct}%`, 'Share', 'var(--purple)'],
            [ind.moat_rating, 'Moat', ind.moat_rating === 'wide' ? 'var(--green)' : ind.moat_rating === 'narrow' ? 'var(--yellow)' : 'var(--red)'],
          ].map(([val, label, color]) =>
            h('div', { style: { flex: '1', minWidth: '90px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: '10px', padding: '12px', textAlign: 'center' } },
              h('div', { className: 'metric-label' }, label),
              h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color, textTransform: 'uppercase' } }, val)
            )
          )
        ),

        // Porter's Five Forces
        porters.length ? h('div', { className: 'card', style: { marginBottom: '16px' } },
          h('h3', { style: { marginBottom: '14px' } }, "Porter's Five Forces"),
          renderBarChart(
            porters.map(([k, v]) => ({
              name: k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
              value: v.score,
              color: v.score > 6 ? 'var(--red)' : v.score > 3 ? 'var(--yellow)' : 'var(--green)',
            })),
            maxForce,
            v => `${v}/10`
          ),
          h('div', { style: { marginTop: '12px' } },
            ...porters.map(([k, v]) =>
              h('p', { className: 'text-xs text-dim', style: { padding: '3px 0', lineHeight: '1.5' } }, `${k.replace(/_/g, ' ')}: ${v.detail}`)
            )
          )
        ) : null,

        // Moat
        h('div', { className: 'card', style: { marginBottom: '16px' } },
          h('h3', { style: { marginBottom: '10px' } }, 'Competitive Moat'),
          ind.moat_sources?.map(s => h('p', { className: 'text-sm text-muted', style: { padding: '4px 0', lineHeight: '1.6' } }, `◆ ${s}`)),
        ),

        // Strategic summary
        h('div', { className: 'card', style: { marginBottom: '16px' } },
          h('p', { className: 'text-muted text-sm', style: { lineHeight: '1.7', marginBottom: '16px' } }, ind.strategic_position_summary),
          h('div', { className: 'grid gap-16', style: { gridTemplateColumns: 'repeat(auto-fit,minmax(200px,1fr))' } },
            ...[
              ['Advantages', ind.competitive_advantages, 'var(--green)', '↑'],
              ['Risks', ind.key_industry_trends, 'var(--blue)', '→'],
              ['Tailwinds', ind.secular_tailwinds, 'var(--cyan)', '↗'],
              ['Headwinds', ind.secular_headwinds, 'var(--yellow)', '↙'],
            ].map(([title, items, color, icon]) => items?.length ?
              h('div', {},
                h('div', { className: 'text-xxs uppercase font-bold', style: { color, marginBottom: '6px' } }, title),
                ...items.map(item => h('p', { className: 'text-sm text-muted', style: { padding: '3px 0', lineHeight: '1.5' } }, `${icon} ${item}`))
              ) : null
            ),
          )
        ),

        // Competitors
        ind.key_competitors?.length ? h('div', { className: 'card' },
          h('h3', { style: { marginBottom: '10px' } }, 'Key Competitors'),
          ...ind.key_competitors.map(comp =>
            h('div', { className: 'flex justify-between items-center', style: { padding: '8px 0', borderBottom: '1px solid var(--border)' } },
              h('div', {},
                h('span', { className: 'font-bold text-sm' }, comp.name),
                h('span', { className: 'text-xs text-dim', style: { marginLeft: '8px' } }, comp.key_advantage),
              ),
              h('span', { className: 'mono text-sm text-muted' }, `${comp.market_share_pct}% share`)
            )
          )
        ) : null,
      );

    // ── DEBATE TAB ──
    case 'debate':
      return h('div', { className: 'fade-up', style: { maxWidth: '720px', margin: '0 auto' } },
        h('div', { className: 'flex justify-between items-center', style: { marginBottom: '20px' } },
          h('div', {},
            h('h2', { style: { marginBottom: '2px' } }, 'IC Debate'),
            h('p', { className: 'text-sm text-dim' }, `${db?.debate?.length || 0} messages — back-and-forth between 13 legendary investors`)
          ),
        ),
        db?.debate?.map((msg, i) => {
          const member = IC_MEMBERS.find(m => m.name === msg.speaker);
          const toneColor = msg.tone === 'bullish' ? 'var(--green)' : msg.tone === 'bearish' ? 'var(--red)' : msg.tone === 'challenging' ? 'var(--yellow)' : msg.tone === 'conceding' ? 'var(--purple)' : msg.tone === 'provocative' ? 'var(--orange)' : 'var(--t3)';
          return h('div', { className: 'debate-msg', style: { animationDelay: `${i * 0.03}s` } },
            h('div', { className: 'avatar', style: { background: member?.color || 'var(--t3)' } }, member?.avatar || '?'),
            h('div', { style: { flex: '1' } },
              h('div', { className: 'flex items-center gap-8', style: { marginBottom: '4px' } },
                h('span', { className: 'font-bold text-sm' }, msg.speaker),
                h('span', { className: 'badge', style: { color: toneColor, background: `color-mix(in srgb, ${toneColor} 12%, transparent)` } }, msg.tone),
              ),
              h('p', { className: 'text-muted', style: { fontSize: '14px', lineHeight: '1.65' } }, msg.message)
            )
          );
        }) || h('p', { className: 'text-dim', style: { textAlign: 'center', padding: '40px' } }, 'No debate data'),
      );

    // ── VOTES TAB ──
    case 'votes':
      return h('div', { className: 'fade-up' },
        h('div', { className: 'flex gap-8', style: { marginBottom: '20px' } },
          h('div', { style: { flex: 1, background: 'var(--green10)', border: '1px solid var(--green20)', borderRadius: '12px', padding: '16px', textAlign: 'center' } },
            h('div', { className: 'mono', style: { fontSize: '30px', fontWeight: '800', color: 'var(--green)' } }, v.investCount),
            h('div', { className: 'text-xs font-bold', style: { color: 'var(--green)' } }, 'INVEST')
          ),
          h('div', { style: { flex: 1, background: 'var(--red10)', border: '1px solid var(--red20)', borderRadius: '12px', padding: '16px', textAlign: 'center' } },
            h('div', { className: 'mono', style: { fontSize: '30px', fontWeight: '800', color: 'var(--red)' } }, v.totalVotes - v.investCount),
            h('div', { className: 'text-xs font-bold', style: { color: 'var(--red)' } }, 'PASS')
          ),
        ),
        h('div', { className: 'grid gap-10', style: { gridTemplateColumns: 'repeat(auto-fill,minmax(340px,1fr))' } },
          ...votes.map((vote, i) => {
            const isInvest = vote.vote === 'INVEST';
            const member = IC_MEMBERS.find(m => m.name === vote.name) || IC_MEMBERS[i];
            const isExpanded = STATE.expandedVote === i;
            return h('div', {
              className: `vote-card ${isInvest ? 'invest' : 'pass'}`,
              onClick: () => { STATE.expandedVote = isExpanded ? null : i; render(); }
            },
              h('div', { className: 'flex items-center gap-10' },
                h('div', { className: 'avatar', style: { background: member?.color || 'var(--t3)' } }, member?.avatar),
                h('div', { style: { flex: 1 } },
                  h('div', { className: 'font-bold', style: { fontSize: '14px' } }, vote.name),
                  h('div', { className: 'text-xs text-dim' }, member?.firm),
                ),
                h('div', { style: { textAlign: 'right' } },
                  h('div', { className: 'mono font-black text-sm', style: { color: isInvest ? 'var(--green)' : 'var(--red)' } }, vote.vote),
                  isInvest ? h('div', { className: 'text-xs text-dim' }, `${vote.position_size_pct}% size`) : null,
                )
              ),
              // Conviction bar
              h('div', { className: 'flex items-center gap-8', style: { marginTop: '10px' } },
                h('div', { className: 'conviction-track' },
                  h('div', { className: 'conviction-fill', style: { width: `${((vote.conviction || 0) / 10) * 100}%`, background: isInvest ? 'var(--green)' : 'var(--red)' } })
                ),
                h('span', { className: 'mono text-xs text-dim' }, `${vote.conviction}/10`),
              ),
              // Expanded details
              isExpanded ? h('div', { className: 'vote-details' },
                h('p', { className: 'text-sm text-muted', style: { lineHeight: '1.65', marginBottom: '12px' } }, vote.reasoning),
                vote.time_horizon ? h('p', { className: 'text-xs text-dim', style: { marginBottom: '8px' } }, `⏱ Horizon: ${vote.time_horizon}`) : null,
                vote.risk_reward_assessment ? h('p', { className: 'text-xs text-dim', style: { marginBottom: '12px' } }, `⚖ R/R: ${vote.risk_reward_assessment}`) : null,
                h('div', { className: 'grid', style: { gridTemplateColumns: '1fr 1fr', gap: '12px' } },
                  h('div', {},
                    h('div', { className: 'text-xxs uppercase font-bold', style: { color: 'var(--yellow)', marginBottom: '4px' } }, 'Key Concern'),
                    h('p', { className: 'text-xs text-dim', style: { lineHeight: '1.5' } }, vote.key_concern)
                  ),
                  h('div', {},
                    h('div', { className: 'text-xxs uppercase font-bold', style: { color: 'var(--green)', marginBottom: '4px' } }, 'Key Catalyst'),
                    h('p', { className: 'text-xs text-dim', style: { lineHeight: '1.5' } }, vote.key_catalyst)
                  ),
                )
              ) : null,
            );
          })
        ),
      );

    // ── COMPS TAB ──
    case 'comps':
      if (!est?.comparable_companies?.length) return h('div', { className: 'text-dim', style: { textAlign: 'center', padding: '40px' } }, 'No comparable company data.');
      return h('div', { className: 'fade-up' },
        h('h2', { style: { marginBottom: '16px' } }, 'Comparable Companies'),
        fm.comps_valuation_context ? h('p', { className: 'text-muted text-sm', style: { lineHeight: '1.6', marginBottom: '16px', maxWidth: '700px' } }, fm.comps_valuation_context) : null,
        h('div', { style: { overflowX: 'auto' } },
          h('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: '13px' } },
            h('thead', {},
              h('tr', {},
                ...['Company', 'Ticker', 'EV/Rev', 'EV/EBITDA', 'Fwd P/E', 'Rev Gr', 'Op Mgn'].map(hd =>
                  h('th', { style: { textAlign: 'left', padding: '10px 12px', borderBottom: '2px solid var(--border)', color: 'var(--t3)', fontWeight: '600', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.5px' } }, hd)
                )
              )
            ),
            h('tbody', {},
              ...est.comparable_companies.map(comp =>
                h('tr', {},
                  h('td', { style: { padding: '10px 12px', borderBottom: '1px solid var(--border)', fontWeight: '600' } }, comp.name),
                  h('td', { className: 'mono text-dim', style: { padding: '10px 12px', borderBottom: '1px solid var(--border)' } }, comp.ticker),
                  h('td', { className: 'mono', style: { padding: '10px 12px', borderBottom: '1px solid var(--border)' } }, `${comp.ev_revenue}x`),
                  h('td', { className: 'mono', style: { padding: '10px 12px', borderBottom: '1px solid var(--border)' } }, `${comp.ev_ebitda}x`),
                  h('td', { className: 'mono', style: { padding: '10px 12px', borderBottom: '1px solid var(--border)' } }, `${comp.pe_forward}x`),
                  h('td', { className: 'mono', style: { padding: '10px 12px', borderBottom: '1px solid var(--border)', color: comp.revenue_growth_pct > 0 ? 'var(--green)' : 'var(--red)' } }, `${comp.revenue_growth_pct}%`),
                  h('td', { className: 'mono', style: { padding: '10px 12px', borderBottom: '1px solid var(--border)' } }, `${comp.operating_margin_pct}%`),
                )
              ),
              // Subject company row
              h('tr', { style: { background: 'var(--card2)' } },
                h('td', { style: { padding: '10px 12px', fontWeight: '800', color: 'var(--green)' } }, `${c.company_name} ★`),
                h('td', { className: 'mono', style: { padding: '10px 12px', color: 'var(--green)' } }, c.ticker),
                h('td', { className: 'mono font-bold', style: { padding: '10px 12px' } }, `${c.ev_revenue}x`),
                h('td', { className: 'mono font-bold', style: { padding: '10px 12px' } }, `${c.ev_ebitda}x`),
                h('td', { className: 'mono font-bold', style: { padding: '10px 12px' } }, `${c.forward_pe}x`),
                h('td', { className: 'mono font-bold', style: { padding: '10px 12px', color: c.revenue_growth_yoy_pct > 0 ? 'var(--green)' : 'var(--red)' } }, `${c.revenue_growth_yoy_pct}%`),
                h('td', { className: 'mono font-bold', style: { padding: '10px 12px' } }, `${c.operating_margin_pct}%`),
              ),
            )
          )
        ),
      );

    default: return null;
    }
  };

  // ── MAIN RESULTS LAYOUT ──
  return h('div', { className: 'container' },
    // Nav bar
    h('div', { className: 'flex items-center', style: { padding: '8px 0 12px' } },
      h('button', { className: 'btn-xs', style: { background: 'none', border: 'none', color: 'var(--t3)', cursor: 'pointer', fontFamily: 'inherit', fontSize: '13px' }, onClick: () => { STATE.phase = 'input'; STATE.ticker = ''; render(); } }, '← New Analysis'),
      h('div', { style: { flex: 1 } }),
      h('button', { className: 'download-btn', style: { padding: '7px 14px', fontSize: '12px' }, onClick: downloadModel }, '📥 XLSX'),
    ),

    // Hero
    h('div', { className: 'flex justify-between items-center wrap gap-12 fade-up', style: { marginBottom: '8px' } },
      h('div', {},
        h('div', { className: 'flex items-center gap-10' },
          h('h1', {}, c.company_name),
          h('span', { className: 'mono font-bold text-dim', style: { fontSize: '14px', background: 'var(--card)', padding: '4px 10px', borderRadius: '6px' } }, c.ticker),
        ),
        h('p', { className: 'text-sm text-dim', style: { marginTop: '3px' } }, `${c.sector} · ${c.sub_industry || ''}`)
      ),
      h('div', { style: { textAlign: 'right' } },
        h('div', { className: 'mono', style: { fontSize: '38px', fontWeight: '800', letterSpacing: '-2px' } }, `$${c.current_price}`),
        h('div', { className: 'mono text-sm font-bold', style: { color: v.expRet > 0 ? 'var(--green)' : 'var(--red)' } },
          `PW Target $${fm.probability_weighted_target} (${v.expRet > 0 ? '+' : ''}${v.expRet}%)`
        ),
      )
    ),

    // Verdict banner
    h('div', { className: 'card fade-up stagger-1', style: { borderColor: vc + '33', marginBottom: '16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '14px' } },
      h('div', { className: 'flex items-center gap-14' },
        h('div', { style: { width: '48px', height: '48px', borderRadius: '14px', background: vc + '15', border: `2px solid ${vc}40`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '22px' } },
          v.decision.includes('BUY') ? '🟢' : v.decision === 'HOLD' ? '🟡' : '🔴'
        ),
        h('div', {},
          h('div', { style: { fontSize: '22px', fontWeight: '900', color: vc, letterSpacing: '0.5px' } }, v.decision),
          h('div', { className: 'text-sm text-muted' }, v.sizeLabel),
        )
      ),
      h('div', { className: 'flex gap-20' },
        ...[
          ['IC Vote', `${v.investCount}/${v.totalVotes}`],
          ['Conviction', `${v.avgConviction}/10`],
          ['R:R', `${v.rrRatio}x`],
          ['Exp Return', `${v.expRet > 0 ? '+' : ''}${v.expRet}%`],
        ].map(([label, val]) =>
          h('div', { style: { textAlign: 'center' } },
            h('div', { className: 'text-xxs text-dim uppercase', style: { marginBottom: '3px' } }, label),
            h('div', { className: 'mono font-bold', style: { fontSize: '18px' } }, val)
          )
        )
      )
    ),

    // Price pills
    h('div', { className: 'flex gap-4 wrap fade-up stagger-2', style: { marginBottom: '20px' } },
      ...priceTargets.map((p, i) =>
        h('div', { style: { flex: 1, minWidth: '100px', textAlign: 'center', padding: '10px 6px', borderRadius: '10px', background: 'var(--card)', border: '1px solid var(--border)' } },
          h('div', { className: 'text-xxs text-dim uppercase', style: { marginBottom: '3px' } }, p.name),
          h('div', { className: 'mono font-bold', style: { fontSize: '16px', color: p.color } }, `$${p.value}`),
          i > 0 && c.current_price > 0 ? h('div', { className: 'mono text-xxs font-bold', style: { color: p.value >= c.current_price ? 'var(--green)' : 'var(--red)' } },
            `${p.value >= c.current_price ? '+' : ''}${(((p.value - c.current_price) / c.current_price) * 100).toFixed(1)}%`
          ) : null,
        )
      )
    ),

    // Tabs
    h('div', { className: 'tabs fade-up stagger-3' },
      ...['overview', 'model', 'industry', 'debate', 'votes', 'comps'].map(t =>
        h('button', {
          className: `tab ${STATE.tab === t ? 'active' : ''}`,
          onClick: () => { STATE.tab = t; render(); },
        }, t === 'debate' ? 'IC Debate' : t.charAt(0).toUpperCase() + t.slice(1))
      )
    ),

    // Tab content
    tabContent(),
  );
}

// ── INIT ──
render();

</script>
</body>
</html>
